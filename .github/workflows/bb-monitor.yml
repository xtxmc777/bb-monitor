name: BB Monitor

on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bb-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_ASSETS: ${{ secrets.TG_ASSETS }}
          TG_PROGRAMS: ${{ secrets.TG_PROGRAMS }}
        run: bash monitor.sh

      - name: Commit state
        run: |
          git config user.name "bb-monitor"
          git config user.email "actions@github.com"
          git add state/
          git diff --staged --quiet || git commit -m "state update $(date -u +%F_%H:%M)"
          git push
